services:
  teachify-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teachify-api
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: teachify-postgres
    environment:
      POSTGRES_DB: teachify
      POSTGRES_USER: teachify
      POSTGRES_PASSWORD: teachify
    volumes:
      - teachify_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teachify -d teachify"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  teachify_pg_data:
