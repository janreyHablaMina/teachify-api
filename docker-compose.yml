services:
  teachify-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teachify-api
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    volumes:
      - .:/var/www/html
      - ./.env.docker:/var/www/html/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: teachify-postgres
    environment:
      POSTGRES_DB: teachify
      POSTGRES_USER: teachify
      POSTGRES_PASSWORD: teachify
    volumes:
      - teachify_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teachify -d teachify"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: teachify-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: janreyminadev@gmail.com
      PGADMIN_DEFAULT_PASSWORD: janreyMina17!
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  teachify_pg_data:
